<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaxy Learning Adventure</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>🌌 GALAXY LEARNING ADVENTURE</h1>
<div id="mascot">🛸</div>

<div class="container" id="menu">
  <div class="card">
    <h2>Choose Your Galaxy</h2>
    <button id="btnMath">🧮 Math Galaxy</button>
    <button id="btnEnglish">📘 English Galaxy</button>
  </div>
</div>

<div class="container hidden" id="game">
  <div class="card">

    <div class="galaxy-map" id="galaxyMap"></div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <h2 id="question"></h2>
    <div id="choices"></div>
    <div id="feedback"></div>

    <p>⭐ Score: <span id="score">0</span> | ❤️ Lives: <span id="lives">3</span></p>

    <button id="btnBack">Back to Galaxy</button>
  </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
